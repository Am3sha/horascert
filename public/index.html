<!doctype html>
<html lang="en">
  <head>
    <!-- === Charset & Viewport === -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1f3a" />

    <!-- === Performance: Resource Hints === -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- === Favicon & Icons === -->
    <!-- Custom favicon from imgeteam folder with cache busting -->
    <link rel="icon" href="/imgeteam/favicon.ico?v=1.0" type="image/x-icon" />
    <!-- Apple touch icon for iOS -->
    <link rel="apple-touch-icon" href="/imgeteam/favicon.ico?v=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- === Critical SEO Meta Tags === -->
    <title>
      HorasCert - International ISO Certification Authority | EGAC Accredited
    </title>
    <meta
      name="description"
      content="HORAS-Cert is an EGAC accredited ISO certification body in Egypt, providing internationally recognized ISO 9001, 14001, 45001, and 22000 certification services. IAF MLA recognized."
    />
    <meta
      name="keywords"
      content="HorasCert, HORAS Certification, ISO certification Egypt, EGAC accredited, ISO 9001, ISO 14001, ISO 45001, ISO 22000, certification authority, quality management, IAF MLA, international certification"
    />
    <meta name="author" content="HORAS Certification Authority" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <link rel="canonical" href="https://horascert.com/" />

    <!-- === Open Graph / Social Media (Premium) === -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://horascert.com/" />
    <meta
      property="og:title"
      content="HorasCert - International ISO Certification Authority | EGAC Accredited"
    />
    <meta
      property="og:description"
      content="EGAC accredited ISO certification body providing internationally recognized ISO 9001, 14001, 45001, and 22000 certification services. IAF MLA recognized."
    />
    <meta property="og:image" content="https://horascert.com/logo-full.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="HorasCert" />

    <!-- === Twitter Card === -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://horascert.com/" />
    <meta
      name="twitter:title"
      content="HorasCert - ISO Certification Authority"
    />
    <meta
      name="twitter:description"
      content="EGAC & IAF accredited ISO certification services. ISO 9001, 14001, 45001, 22000 certification authority."
    />
    <meta name="twitter:image" content="https://horascert.com/logo-full.svg" />

    <!-- === Structured Data (Schema.org) === -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "HORAS Certification Authority",
        "alternateName": "HorasCert",
        "description": "EGAC accredited ISO certification body providing internationally recognized certification services",
        "url": "https://horascert.com",
        "logo": "https://horascert.com/logo-full.svg",
        "sameAs": [
          "https://www.facebook.com/horas.cert/",
          "https://www.linkedin.com/company/horas-cert"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Service",
          "email": "info@horascert.com",
          "availableLanguage": ["en", "ar"]
        },
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "EG",
          "addressLocality": "Egypt"
        },
        "areaServed": ["EG", "SA", "AE", "KW", "QA", "BH", "Worldwide"],
        "foundingYear": 2010,
        "keywords": "ISO certification, EGAC accredited, ISO 9001, ISO 14001, ISO 45001, ISO 22000, certification authority, IAF MLA",
        "serviceType": [
          "ISO 9001 Certification",
          "ISO 14001 Certification",
          "ISO 45001 Certification",
          "ISO 22000 Certification",
          "Management System Certification"
        ],
        "certifications": [
          "ISO 9001:2015",
          "ISO 14001:2015",
          "ISO 45001:2018",
          "ISO 22000:2018"
        ]
      }
    </script>

    <!-- === Critical CSS (Prevents Button Color Flashing) === -->
    <style>
      :root {
        --primary-gold: #d4a83d;
        --primary-navy: #2c4f7c;
        --primary-green: #1b5e44;
        --text-on-gold: #1f3a5f;
        --white: #ffffff;
      }

      .btn-primary {
        background: #d4a83d !important;
        color: #1f3a5f !important;
      }

      .btn-secondary {
        background-color: transparent !important;
        color: #2c4f7c !important;
        border: 2px solid #2c4f7c !important;
      }

      .btn-success {
        background: #1b5e44 !important;
        color: #ffffff !important;
      }

      body {
        opacity: 1 !important;
      }
    </style>

    <!-- === Google Fonts (Optimized Loading) === -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
      as="style"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
      crossorigin
    />

    <!-- === Mobile Optimization === -->
    <meta
      name="format-detection"
      content="telephone=no, email=no, address=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- === Search Engine Verification === -->
    <!-- Google Site Verification (Add your code after creating Google Search Console) -->
    <meta
      name="google-site-verification"
      content="YOUR_VERIFICATION_CODE_HERE"
    />

    <!-- Bing Site Verification (Add your code after creating Bing Webmaster Tools) -->
    <meta name="msvalidate.01" content="YOUR_BING_CODE_HERE" />
  </head>
  <body>
    <noscript>
      <div
        style="
          padding: 20px;
          text-align: center;
          font-family: system-ui, sans-serif;
        "
      >
        <h1>JavaScript Required</h1>
        <p>
          HORAS Cert website requires JavaScript to be enabled. Please enable it
          in your browser settings.
        </p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
