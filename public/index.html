    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <!-- === Favicon === -->
    <link rel="icon" href="%PUBLIC_URL%/imgeteam/favicon.ico" />

    <!-- === SEO Meta Tags === -->
    <meta 
      name="description" 
      content="HORAS Cert – EGAC Accredited ISO Certification Body. Internationally recognized certification services for ISO 9001, ISO 14001, ISO 45001, ISO 22000, HACCP, and GMP in Egypt and the Middle East."

      name="keywords"

      property="og:description"

    <meta property="og:image" content="%PUBLIC_URL%/imgeteam/78e306e6-0535-4e1c-a4ae-8f5895dc1c44.png" />

    <meta property="twitter:url" content="https://horascert.com/" />
    <meta property="twitter:title" content="HORASCERT - ISO Certification Body" />
    <meta property="twitter:description" content="EGAC Accredited certification body for ISO standards." />

    <link rel="preload" as="image" href="/imges/About-home.jpeg" fetchpriority="high">
    <link rel="preload" as="image" href="/imgeteam/78e306e6-0535-4e1c-a4ae-8f5895dc1c44.png">
